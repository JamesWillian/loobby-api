server:
  port: 8080

spring:
  application:
    name: Loobby

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: false

  web:
    error:
      include-stacktrace: ALWAYS

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-minutes: 15
    refresh-token-validity-minutes: 21600   # 60 * 24 * 15  (15 dias)

management:
  endpoints:
    web:
      exposure:
        include: health, info

file:
  storage:
    location: ./uploads

resend:
  api-key: ${RESEND_API_KEY}
  from-email: "Loobby <noreply@mail.loobby.app>"

app:
   base-url: ${APP_BASE_URL:https://api.loobby.app}
   email-verification:
     expiration-hours: 24
     resend-cooldown-minutes: 3

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    app.loobby: DEBUG
