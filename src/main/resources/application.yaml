server:
  port: 8080

spring:
  application:
    name: Loobby

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: false

  web:
    error:
      include-stacktrace: ALWAYS

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-minutes: 15
    refresh-token-validity-minutes: 21600   # 60 * 24 * 15  (15 dias)

management:
  endpoints:
    web:
      exposure:
        include: health, info

file:
  storage:
    location: ./uploads

resend:
  api-key: ${RESEND_API_KEY}
  from-email: "Loobby <noreply@mail.loobby.app>"

app:
   base-url: ${APP_BASE_URL:https://api.loobby.app}
   email-verification:
     expiration-hours: 24
     resend-cooldown-minutes: 3
   password-reset:
     expiration-hours: 1
     resend-cooldown-minutes: 3

google:
  client-id: ${GOOGLE_CLIENT_ID}

loobby:
  notifications:
    # Caminho absoluto para o service account JSON do Firebase.
    # Em dev: coloque o arquivo fora do repo (ex: ~/secrets/loobby-fcm.json)
    # Em prod: injete via variável de ambiente FIREBASE_CREDENTIALS_PATH
    firebase-credentials-path: ${FIREBASE_CREDENTIALS_PATH:/secrets/loobby-fcm.json}
    # Se false, NotificationService loga mas não envia (útil para testes locais sem Firebase)
    enabled: ${NOTIFICATIONS_ENABLED:true}
    # Timezone para jobs diários e cálculo de "hoje"
    timezone: America/Sao_Paulo
    # Horas de antecedência para lembrete de evento
    reminder-hours-before: 4
    # Horário do job diário matinal (8h da manhã em America/Sao_Paulo)
    daily-job-cron: "0 0 8 * * *"
    # Granularidade do job de lembrete (a cada 15 min)
    reminder-job-cron: "0 */15 * * * *"
    # Debounce para agrupamento de RSVP_CONFIRMED_BY_PEER (em minutos)
    rsvp-peer-debounce-minutes: 15

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    app.loobby: DEBUG
