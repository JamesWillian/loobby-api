server:
  port: 8080

spring:
  application:
    name: Loobby

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: false

  web:
    error:
      include-stacktrace: NEVER

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-minutes: 15
    refresh-token-validity-minutes: 21600   # 60 * 24 * 15  (15 dias)

management:
  endpoints:
    web:
      exposure:
        include: health, info

file:
  storage:
    location: ./uploads

resend:
  api-key: ${RESEND_API_KEY}
  from-email: "Loobby <noreply@mail.loobby.app>"

app:
   base-url: ${APP_BASE_URL:https://api.loobby.app}
   email-verification:
     expiration-hours: 24
     resend-cooldown-minutes: 3
   password-reset:
     expiration-hours: 1
     resend-cooldown-minutes: 3

google:
  client-ids:
    ${GOOGLE_WEB_CLIENT_ID},${GOOGLE_IOS_CLIENT_ID},${GOOGLE_ANDROID_CLIENT_ID}

loobby:
  public:
    # Base URL do site público (frontend) — usada para montar a URL completa
    # devolvida quando o host gera um link de RSVP.
    web-base-url: ${LOOBBY_WEB_BASE_URL:https://loobby.app}
    # Quantas horas após a data do evento o link continua válido.
    link-token-extra-hours: 24
    # TTL (em horas) do registro em event_rsvp_pending. Se o usuário não
    # concluir o OTP dentro desse prazo após chamar /rsvps/start, o registro
    # é apagado pelo PendingRsvpCleanupScheduler.
    pending-rsvp-ttl-hours: 24
    # Cron do job que limpa pendings expirados (hourly por padrão).
    pending-cleanup-cron: "0 0 * * * *"

  # Config web do Firebase — valores são públicos (apiKey é identificador, não secret).
  # São injetados no public-rsvp.html para o SDK JavaScript inicializar o Auth.
  firebase:
    web-config:
      api-key: ${FIREBASE_WEB_API_KEY:}
      auth-domain: ${FIREBASE_WEB_AUTH_DOMAIN:}
      project-id: ${FIREBASE_WEB_PROJECT_ID:}
      app-id: ${FIREBASE_WEB_APP_ID:}

  notifications:
    # Caminho para o service account JSON do Firebase.
    firebase-credentials-path: ${FIREBASE_CREDENTIALS_PATH:./secrets/loobby-fcm.json}
    # Se false, NotificationService loga mas não envia (útil para testes locais sem Firebase)
    enabled: ${NOTIFICATIONS_ENABLED:true}
    # Timezone para jobs diários e cálculo de "hoje"
    timezone: America/Sao_Paulo
    # Horas de antecedência para lembrete de evento
    reminder-hours-before: 4
    # Horário do job diário matinal (8h da manhã em America/Sao_Paulo)
    daily-job-cron: "0 0 8 * * *"
    # Granularidade do job de lembrete (a cada 15 min)
    reminder-job-cron: "0 */10 * * * *"
    # Debounce para agrupamento de RSVP_CONFIRMED_BY_PEER (em minutos)
    rsvp-peer-debounce-minutes: 10

logging:
  level:
    root: INFO
#    org.springframework.web: DEBUG
#    org.springframework.security: DEBUG
#    org.hibernate.SQL: DEBUG
#    org.springframework.boot.autoconfigure: DEBUG
    app.loobby: INFO
