server:
  port: 8080

spring:
  application:
    name: Loobby

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: false

  web:
    error:
      include-stacktrace: NEVER

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-minutes: 15
    refresh-token-validity-minutes: 21600   # 60 * 24 * 15  (15 dias)

management:
  endpoints:
    web:
      exposure:
        include: health, info

file:
  storage:
    location: ./uploads

resend:
  api-key: ${RESEND_API_KEY}
  from-email: "Loobby <noreply@mail.loobby.app>"

# Integração com o catálogo de jogos RAWG (https://rawg.io). A key fica só no servidor.
rawg:
  api-key: ${RAWG_API_KEY}
  base-url: https://api.rawg.io/api
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
  search-page-size: 20
  soft-ttl-days: 7        # stale-while-revalidate: serve do cache e atualiza em background
  hard-ttl-days: 30       # força refresh síncrono
  circuit-failure-threshold: 5
  circuit-open-minutes: 2

app:
   base-url: ${APP_BASE_URL:https://api.loobby.app}
   email-verification:
     expiration-hours: 24
     resend-cooldown-minutes: 3
   password-reset:
     expiration-hours: 1
     resend-cooldown-minutes: 3

google:
  client-ids:
    ${GOOGLE_WEB_CLIENT_ID},${GOOGLE_IOS_CLIENT_ID},${GOOGLE_ANDROID_CLIENT_ID}

loobby:
  notifications:
    # Caminho para o service account JSON do Firebase.
    firebase-credentials-path: ${FIREBASE_CREDENTIALS_PATH:./secrets/loobby-fcm.json}
    # Se false, NotificationService loga mas não envia (útil para testes locais sem Firebase)
    enabled: ${NOTIFICATIONS_ENABLED:true}
    # Timezone para jobs diários e cálculo de "hoje"
    timezone: America/Sao_Paulo
    # Horas de antecedência para lembrete de evento
    reminder-hours-before: 4
    # Horário do job diário matinal (8h da manhã em America/Sao_Paulo)
    daily-job-cron: "0 0 8 * * *"
    # Granularidade do job de lembrete (a cada 5 min)
    reminder-job-cron: "0 */5 * * * *"
    # Debounce para agrupamento de RSVP_CONFIRMED_BY_PEER (em minutos)
    rsvp-peer-debounce-minutes: 5

logging:
  level:
    root: INFO
#    org.springframework.web: DEBUG
#    org.springframework.security: DEBUG
#    org.hibernate.SQL: DEBUG
#    org.springframework.boot.autoconfigure: DEBUG
    app.loobby: INFO
